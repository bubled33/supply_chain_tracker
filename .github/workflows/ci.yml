name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"

jobs:
  test:
    name: Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - delivery_service
          - warehouse_service
          - shipment_service
          - saga_coordinator
          - auth_service

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: services/${{ matrix.service }}/.venv
          key: ${{ runner.os }}-${{ matrix.service }}-${{ hashFiles(format('services/{0}/poetry.lock', matrix.service)) }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests with coverage
        run: poetry run pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml -q
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
          JWT_SECRET_KEY: "test-secret-key"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}
          fail_ci_if_error: false

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check services/ libs/ --ignore E501,F401

  build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        service:
          - delivery_service
          - warehouse_service
          - shipment_service
          - saga_coordinator
          - auth_service
          - blockchain_service

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            -t supply-chain/${{ matrix.service }}:ci \
            .
