<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" style="background-color: rgb(255, 255, 255);" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="820px" height="535px" viewBox="0 0 820 535" content="&lt;mxfile host=&quot;app.diagrams.net&quot; version=&quot;29.6.1&quot;&gt;&lt;diagram name=&quot;Page-1&quot; id=&quot;happy-path-sequence&quot;&gt;&lt;mxGraphModel dx=&quot;820&quot; dy=&quot;610&quot; grid=&quot;1&quot; gridSize=&quot;10&quot; guides=&quot;1&quot; tooltips=&quot;1&quot; connect=&quot;1&quot; arrows=&quot;1&quot; fold=&quot;1&quot; page=&quot;1&quot; pageScale=&quot;1&quot; pageWidth=&quot;820&quot; pageHeight=&quot;610&quot; math=&quot;0&quot; shadow=&quot;0&quot;&gt;&lt;root&gt;&lt;mxCell id=&quot;0&quot;/&gt;&lt;mxCell id=&quot;1&quot; parent=&quot;0&quot;/&gt;&lt;mxCell id=&quot;title&quot; value=&quot;Happy Path — Supply Chain Tracker&quot; style=&quot;text;html=1;strokeColor=none;fillColor=none;align=center;verticalAlign=middle;fontSize=16;fontStyle=1;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;150&quot; y=&quot;5&quot; width=&quot;520&quot; height=&quot;25&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;h-client&quot; value=&quot;Client&quot; style=&quot;rounded=0;whiteSpace=wrap;html=1;fontSize=10;fontStyle=1;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;0&quot; y=&quot;40&quot; width=&quot;120&quot; height=&quot;40&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;h-shipment&quot; value=&quot;shipment_service&quot; style=&quot;rounded=0;whiteSpace=wrap;html=1;fontSize=9;fontStyle=1;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;135&quot; y=&quot;40&quot; width=&quot;120&quot; height=&quot;40&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;h-warehouse&quot; value=&quot;warehouse_service&quot; style=&quot;rounded=0;whiteSpace=wrap;html=1;fontSize=9;fontStyle=1;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;270&quot; y=&quot;40&quot; width=&quot;120&quot; height=&quot;40&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;h-delivery&quot; value=&quot;delivery_service&quot; style=&quot;rounded=0;whiteSpace=wrap;html=1;fontSize=9;fontStyle=1;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;405&quot; y=&quot;40&quot; width=&quot;120&quot; height=&quot;40&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;h-kafka&quot; value=&quot;Kafka&quot; style=&quot;rounded=0;whiteSpace=wrap;html=1;fontSize=9;fontStyle=1;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;540&quot; y=&quot;40&quot; width=&quot;120&quot; height=&quot;40&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;h-blockchain&quot; value=&quot;blockchain_service&quot; style=&quot;rounded=0;whiteSpace=wrap;html=1;fontSize=9;fontStyle=1;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;675&quot; y=&quot;40&quot; width=&quot;120&quot; height=&quot;40&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;/root&gt;&lt;/mxGraphModel&gt;&lt;/diagram&gt;&lt;/mxfile&gt;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0,8 3.5,0 7" fill="#000000"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0,8 3.5,0 7" fill="#888888"/>
    </marker>
  </defs>

  <!-- ===== ACTOR HEADERS ===== -->
  <!-- Client: CX=60 -->
  <rect x="0" y="40" width="120" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="60" y="65" text-anchor="middle" font-size="10" font-weight="bold" fill="#000000" font-family="Helvetica,Arial,sans-serif">Client</text>

  <!-- shipment_service: CX=195 -->
  <rect x="135" y="40" width="120" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="195" y="65" text-anchor="middle" font-size="9" font-weight="bold" fill="#000000" font-family="Helvetica,Arial,sans-serif">shipment_service</text>

  <!-- warehouse_service: CX=330 -->
  <rect x="270" y="40" width="120" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="330" y="65" text-anchor="middle" font-size="9" font-weight="bold" fill="#000000" font-family="Helvetica,Arial,sans-serif">warehouse_service</text>

  <!-- delivery_service: CX=465 -->
  <rect x="405" y="40" width="120" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="465" y="65" text-anchor="middle" font-size="9" font-weight="bold" fill="#000000" font-family="Helvetica,Arial,sans-serif">delivery_service</text>

  <!-- Kafka: CX=600 -->
  <rect x="540" y="40" width="120" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="600" y="65" text-anchor="middle" font-size="9" font-weight="bold" fill="#000000" font-family="Helvetica,Arial,sans-serif">Kafka</text>

  <!-- blockchain_service: CX=735 -->
  <rect x="675" y="40" width="120" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="735" y="65" text-anchor="middle" font-size="9" font-weight="bold" fill="#000000" font-family="Helvetica,Arial,sans-serif">blockchain_service</text>

  <!-- ===== LIFELINES ===== -->
  <line x1="60"  y1="80" x2="60"  y2="510" stroke="#000000" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="195" y1="80" x2="195" y2="510" stroke="#000000" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="330" y1="80" x2="330" y2="510" stroke="#000000" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="465" y1="80" x2="465" y2="510" stroke="#000000" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="600" y1="80" x2="600" y2="510" stroke="#000000" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="735" y1="80" x2="735" y2="510" stroke="#000000" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== [1] SHIPMENT CREATION ===== -->
  <!-- Client → shipment_service: POST /api/v1/shipments -->
  <line x1="60" y1="108" x2="193" y2="108" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="127" y="100" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">[1] POST /api/v1/shipments</text>

  <!-- shipment_service → Kafka: ShipmentCreated -->
  <line x1="195" y1="130" x2="598" y2="130" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="397" y="122" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">ShipmentCreated</text>

  <!-- Kafka → blockchain_service: record (dashed gray) -->
  <line x1="600" y1="148" x2="733" y2="148" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <text x="667" y="140" text-anchor="middle" font-size="9" font-style="italic" fill="#888888" font-family="Helvetica,Arial,sans-serif">record</text>

  <!-- separator -->
  <line x1="20" y1="170" x2="800" y2="170" stroke="#cccccc" stroke-width="0.5"/>

  <!-- ===== [2] INVENTORY RESERVATION ===== -->
  <!-- Client → warehouse_service: POST /api/v1/inventory -->
  <line x1="60" y1="188" x2="328" y2="188" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="194" y="180" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">[2] POST /api/v1/inventory</text>

  <!-- warehouse_service → Kafka: InventoryReserved -->
  <line x1="330" y1="210" x2="598" y2="210" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="464" y="202" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">InventoryReserved</text>

  <!-- separator -->
  <line x1="20" y1="232" x2="800" y2="232" stroke="#cccccc" stroke-width="0.5"/>

  <!-- ===== [3] DELIVERY CREATION ===== -->
  <!-- Client → delivery_service: POST /api/v1/deliveries -->
  <line x1="60" y1="250" x2="463" y2="250" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="262" y="242" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">[3] POST /api/v1/deliveries</text>

  <!-- delivery_service → Kafka: CourierAssigned -->
  <line x1="465" y1="272" x2="598" y2="272" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="532" y="264" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">CourierAssigned</text>

  <!-- separator -->
  <line x1="20" y1="294" x2="800" y2="294" stroke="#cccccc" stroke-width="0.5"/>

  <!-- ===== [4] START DELIVERY ===== -->
  <!-- Client → delivery_service: PATCH /deliveries/{id}/start -->
  <line x1="60" y1="312" x2="463" y2="312" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="262" y="304" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">[4] PATCH /deliveries/{id}/start</text>

  <!-- delivery_service → Kafka: DeliveryInTransit -->
  <line x1="465" y1="334" x2="598" y2="334" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="532" y="326" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">DeliveryInTransit</text>

  <!-- separator -->
  <line x1="20" y1="356" x2="800" y2="356" stroke="#cccccc" stroke-width="0.5"/>

  <!-- ===== [5] COMPLETE DELIVERY ===== -->
  <!-- Client → delivery_service: PATCH /deliveries/{id}/complete -->
  <line x1="60" y1="374" x2="463" y2="374" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="262" y="366" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">[5] PATCH /deliveries/{id}/complete</text>

  <!-- delivery_service → Kafka: DeliveryCompleted -->
  <line x1="465" y1="396" x2="598" y2="396" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="532" y="388" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">DeliveryCompleted</text>

  <!-- Kafka → blockchain_service: record (dashed gray) -->
  <line x1="600" y1="414" x2="733" y2="414" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <text x="667" y="406" text-anchor="middle" font-size="9" font-style="italic" fill="#888888" font-family="Helvetica,Arial,sans-serif">record</text>

  <!-- separator -->
  <line x1="20" y1="436" x2="800" y2="436" stroke="#cccccc" stroke-width="0.5"/>

  <!-- ===== [6] COMPLETE SHIPMENT ===== -->
  <!-- Client → shipment_service: PATCH /shipments/{id}/complete -->
  <line x1="60" y1="454" x2="193" y2="454" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="127" y="446" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">[6] PATCH /shipments/{id}/complete</text>

  <!-- shipment_service → Kafka: ShipmentUpdated (COMPLETED) -->
  <line x1="195" y1="476" x2="598" y2="476" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="397" y="468" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">ShipmentUpdated (COMPLETED)</text>

  <!-- separator -->
  <line x1="20" y1="498" x2="800" y2="498" stroke="#cccccc" stroke-width="0.5"/>

  <!-- Legend: gray dashed = async Kafka consumer -->
  <line x1="20" y1="515" x2="50" y2="515" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <text x="55" y="519" font-size="9" font-style="italic" fill="#888888" font-family="Helvetica,Arial,sans-serif">async Kafka consumer</text>

</svg>
