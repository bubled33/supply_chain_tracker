  <!-- Initial dot -->
  <ellipse cx="395" cy="75" rx="10" ry="10" fill="#000000" stroke="#000000"/>

  <!-- init to STARTED -->
  <line x1="395" y1="85" x2="395" y2="108" stroke="#000000" stroke-width="1.5" marker-end="url(#arr)"/>

