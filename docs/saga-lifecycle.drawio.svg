  <text x="705" y="343" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">CancelShipment → shipment.commands</text>
  <rect x="600" y="362" width="210" height="28" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="705" y="379" text-anchor="middle" font-size="9" fill="#000000" font-family="Helvetica,Arial,sans-serif">UnassignCourier → delivery.commands</text>

  <!-- COMPENSATING to Compensation Commands (dashed) -->
  <line x1="481" y1="335" x2="588" y2="335" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#open-arr)"/>
  <text x="535" y="328" text-anchor="middle" font-size="10" font-style="italic" fill="#666666" font-family="Helvetica,Arial,sans-serif">publishes</text>


