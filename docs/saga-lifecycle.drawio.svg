  <line x1="260" y1="335" x2="298" y2="335" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#open-arr)"/>
  <text x="279" y="328" text-anchor="middle" font-size="10" font-style="italic" fill="#666666" font-family="Helvetica,Arial,sans-serif">triggers</text>

