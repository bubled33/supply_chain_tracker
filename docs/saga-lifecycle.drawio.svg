  <text x="402" y="233" font-size="10" fill="#555555" font-family="Helvetica,Arial,sans-serif">trigger_compensation(</text>
  <text x="402" y="247" font-size="10" fill="#555555" font-family="Helvetica,Arial,sans-serif">  failed_step)</text>

  <!-- COMPENSATING -->
  <rect x="300" y="310" width="180" height="50" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="390" y="341" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000" font-family="Helvetica,Arial,sans-serif">COMPENSATING</text>

