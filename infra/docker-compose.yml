services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: dockerhub.timeweb.cloud/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supply_chain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: dockerhub.timeweb.cloud/confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: dockerhub.timeweb.cloud/confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9094:9094"  # external access from host
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: dockerhub.timeweb.cloud/library/redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: dockerhub.timeweb.cloud/prom/prometheus:v2.53.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d

  grafana:
    image: dockerhub.timeweb.cloud/grafana/grafana:11.0.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # Microservices
  # ---------------------------------------------------------------------------

  auth-service:
    build:
      context: ..
      dockerfile: services/auth_service/Dockerfile
    restart: unless-stopped
    ports:
      - "8005:8005"
    env_file:
      - ../services/auth_service/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_db
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
    depends_on:
      postgres:
        condition: service_healthy

  delivery-service:
    build:
      context: ..
      dockerfile: services/delivery_service/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../services/delivery_service/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/supply_chain
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      USE_KAFKA: "true"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  warehouse-service:
    build:
      context: ..
      dockerfile: services/warehouse_service/Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ../services/warehouse_service/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/supply_chain
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      USE_KAFKA: "true"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  shipment-service:
    build:
      context: ..
      dockerfile: services/shipment_service/Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - ../services/shipment_service/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/supply_chain
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      USE_KAFKA: "true"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  saga-coordinator:
    build:
      context: ..
      dockerfile: services/saga_coordinator/Dockerfile
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - ../services/saga_coordinator/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/supply_chain
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      USE_KAFKA: "true"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  blockchain-service:
    build:
      context: ..
      dockerfile: services/blockchain_service/Dockerfile
    restart: unless-stopped
    ports:
      - "8004:8004"
    env_file:
      - ../services/blockchain_service/.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/supply_chain
      USE_MOCK_BLOCKCHAIN: "true"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  grafana_data:
